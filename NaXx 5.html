<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaXxTech</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #0a0a0a;
    background-image: radial-gradient(circle at 20% 20%, #1a1a40, transparent 40%),
                      radial-gradient(circle at 80% 80%, #00f, transparent 40%);
    scroll-behavior: smooth;

    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 10px #00f;
    cursor: pointer;
}

/* TOPBAR */
.topbar {
    text-align: center;
    padding: 14px;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

/* ICONOS NEON */
.icon {
    font-size: 22px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.icon:hover {
    transform: scale(1.2);
}

.whatsapp {
    text-shadow: 0 0 8px #00ff7f, 0 0 15px #00ff7f;
}

.insta {
    text-shadow: 0 0 8px #ff00ff, 0 0 15px #ff00ff;
}

/* MENU */
.menu {
    text-align: center;
    margin: 20px;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    background: #111;
    border: 1px solid #00f;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    cursor: pointer;
}

/* SECCIONES */
.section {
    display: none;
    padding: 30px;
    text-align: center;
}

.active {
    display: block;
}

/* PRODUCTS */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* CARD */
.card {
    background: #111;
    border: 1px solid #00f;
    padding: 20px;
    width: 260px;
    border-radius: 15px;
}

/* SLIDER */
.slider {
    position: relative;
}

.slider img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
}

.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 5px 10px;
}

.arrow.left { left: 5px; }
.arrow.right { right: 5px; }

/* COLORES */
.colors {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

.color {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid white;
    cursor: pointer;
}

.black { background: black; }
.white { background: white; }
.pink { background: pink; }

/* LIGHTBOX */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

.close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
}

/* GALERIA */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.gallery img {
    width: 220px;
    height: 140px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid #00f;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #222;
    margin-top: auto;
}

/* ========================= */
/* CARRITO (AGREGADO) */
/* ========================= */

.cart {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: #00f;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 0 15px #00f;
    z-index: 9999;
    transition: 0.2s;
}

.cart:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px #00f;
}
</style>
</head>
